header:
  level: full
  created: '2026-05-07'
  status: complete
  reviewed: '2026-05-07'
  critic_issues: 12 found, 12 addressed, 0 dismissed
  title: Transcript Show And Slug-First CLI UX
what: >-
  Add a transcript viewing command and make saved-artifact commands accept human-scale slugs by default while preserving explicit
  file paths. `agora show` displays transcripts, `run` and `resume` show agent responses by default, `--quiet` restores the current
  metadata-only output, and `--verbose` becomes expanded diagnostics.
why: >-
  Users should not need generated JSONL paths to inspect, resume, or analyze deliberations. Showing responses by default better
  matches Agora's purpose: the deliberation content is the primary value, not just the metrics stream.
constraints: >-
  Keep Go-only implementation, managed transcript store behavior, existing explicit path support, resume evidence reuse, and the
  current terminal visual identity. Do not add a persistent config registry. Path-like missing inputs must fail as missing paths,
  not silently fall back to slug search.
scope:
  included:
    - `show` command for transcript viewing
    - slug-or-path behavior for transcript-backed commands
    - config slug-or-path behavior for `validate`
    - normal/quiet/verbose live output modes
    - strict malformed-transcript handling for user-facing transcript commands
    - README, changelog, command help, and verification
  excluded:
    - transcript schema migration
    - evidence refresh or replay controls
    - transcript editing
    - pager/TUI mode
    - remote transcript storage
  deferred:
    - transcript search/filtering
    - HTML or Markdown export
    - persistent named config registry
design: >-
  Use a clear artifact-resolution contract. Existing path-like inputs are paths; if missing, they fail. Transcript slugs search the
  managed transcript store with exact match before prefix match before substring match, selecting newest deterministically within a
  tier. Config slugs for `validate` resolve by file stem in the current directory and `examples/`, with collisions reported rather
  than guessed. Live output has three modes: quiet metadata, normal readable responses, and verbose expanded diagnostics.
tasks:
  - number: 1
    name: Artifact resolution contract
    depends_on: []
    status: complete
    acceptance:
      - GIVEN an existing explicit path WHEN a supported command receives it THEN that path is used directly.
      - GIVEN a path-like input that does not exist WHEN a supported command receives it THEN the command reports the missing path instead of searching slugs.
      - GIVEN a transcript slug WHEN a transcript command resolves it THEN exact matches win before prefix matches before substring matches.
      - GIVEN multiple transcript matches within the same match tier WHEN resolution succeeds THEN the newest matching transcript is selected deterministically.
      - GIVEN resolution behavior is verified WHEN checks run THEN each artifact type has at least one success case and one failure case.
  - number: 2
    name: Transcript command resolution and strict loading
    depends_on:
      - Task 1
    status: complete
    acceptance:
      - GIVEN a stored transcript slug WHEN `resume` uses it THEN the latest matching transcript is selected without requiring `--file`.
      - GIVEN a stored transcript slug WHEN `stats` uses it THEN statistics are computed from that transcript.
      - GIVEN a transcript contains malformed non-blank records WHEN `resume`, `stats`, or `show` reads it THEN the command fails with a transcript-specific error.
      - GIVEN legacy path-based transcript workflows WHEN the commands run THEN path compatibility remains intact.
  - number: 3
    name: Transcript show command
    depends_on:
      - Task 1
      - Task 2
    status: complete
    acceptance:
      - GIVEN a saved transcript WHEN `show <slug>` runs THEN turns render in order with agent identity and response content.
      - GIVEN transcript evidence records WHEN shown THEN source summaries and references remain visible without exposing omitted full source contents.
      - GIVEN consensus markers WHEN shown THEN consensus statements appear at the relevant turns.
      - GIVEN an empty transcript WHEN shown THEN the command fails with a clear message.
      - GIVEN transcript display is verified WHEN checks run THEN there is at least one successful display case and one failure case.
  - number: 4
    name: Live output modes
    depends_on: []
    status: complete
    acceptance:
      - GIVEN `run` or `resume` runs without output-mode flags WHEN an agent turn completes THEN response content is displayed by default.
      - GIVEN `--quiet` is passed WHEN an agent turn completes THEN output matches the prior metadata-only behavior.
      - GIVEN `--verbose` is passed WHEN an agent turn completes THEN response content plus expanded diagnostics are displayed.
      - GIVEN verbose diagnostics are displayed WHEN token or cost details exist THEN input/output/reasoning tokens, cumulative cost, elapsed timing, and consensus progress are visible where available.
      - GIVEN incompatible output-mode flags are passed WHEN the command starts THEN the command rejects the combination clearly.
  - number: 5
    name: Validate config slug UX
    depends_on:
      - Task 1
    status: complete
    acceptance:
      - GIVEN a config file stem in the current directory or `examples/` WHEN `validate <slug>` runs THEN the intended config is validated.
      - GIVEN a config path WHEN `validate <path>` runs THEN existing path-based validation still works.
      - GIVEN multiple configs share a slug WHEN validation is requested THEN the command reports candidates instead of guessing.
      - GIVEN no matching config exists WHEN validation is requested THEN the error describes the searched config locations.
  - number: 6
    name: Verification, docs, and version note
    depends_on:
      - Task 2
      - Task 3
      - Task 4
      - Task 5
    status: complete
    acceptance:
      - GIVEN the implementation is complete WHEN project checks run THEN build, tests, and vet/lint equivalents pass.
      - GIVEN users read command help or README examples THEN `list`, `show`, `stats`, `resume`, `validate`, `--quiet`, and `--verbose` behavior is clear.
      - GIVEN the changelog is read THEN the new command, default-output change, and slug-first inputs are recorded as feature/user-visible changes.
      - GIVEN command behavior changed WHEN tests are reviewed THEN each changed command has at least one expected-use and one failure-path check.
  - number: 7
    name: Plan-level freshness checkpoint
    depends_on:
      - Task 1
      - Task 2
      - Task 3
      - Task 4
      - Task 5
      - Task 6
    status: complete
    acceptance:
      - GIVEN the work is complete WHEN project state is updated THEN plan status, progress, TODO, and surprises reflect delivered behavior.
      - GIVEN user-visible CLI behavior changed WHEN docs metadata is checked THEN no indexed documentation claims stale command behavior.
      - GIVEN follow-up work remains WHEN the plan closes THEN it is recorded as deferred or TODO.
overall_acceptance:
  - GIVEN a managed transcript slug WHEN `show`, `stats`, or `resume` runs THEN the user does not need the generated JSONL path.
  - GIVEN a config slug or path WHEN `validate` runs THEN validation remains one-argument and path-compatible.
  - GIVEN a deliberation is running normally WHEN turns complete THEN agent responses are visible without `--verbose`.
  - GIVEN quiet output is needed WHEN `--quiet` is used THEN the prior low-noise live output remains available.
  - GIVEN diagnostics are needed WHEN `--verbose` is used THEN expanded metrics appear without hiding response content.
surprises: []
