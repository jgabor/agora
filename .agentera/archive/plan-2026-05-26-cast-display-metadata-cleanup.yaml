      - GIVEN an agent has a model configured WHEN the agent cast line renders THEN the model value is shown without an all-caps MODEL label.
      - GIVEN plain mode renders the cast line WHEN the format is inspected THEN it uses clean inline format (badge name persona) with model as metadata, matching the rich path style.
  - number: 3
