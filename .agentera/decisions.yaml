decisions:
- number: 1
  date: '2026-05-03'
  question: How should the closed-loop multi-agent deliberation system be architected?
  context: Need a simple, deterministic script that calls `opencode run` with configurable heterogeneous agents, ring topology,
    time limits, and raw transcript output. Inspired by karpathy/autoresearch and anthropic/ralph-loop. Agents should argue
    and deliberate on a provided goal.
  alternatives:
  - name: Shared history topology
    status: rejected
    description: 'agents see the last K messages from the global transcript regardless of author. Win: more context for each
      turn. Lose: less adversarial tension, more complex orchestrator state.'
  - name: Go implementation
    status: rejected
    description: 'compile to a single static binary. Win: portable, profile signal is strong. Lose: slower iteration, more
      code for subprocess/JSONL handling in a glue script.'
  - name: Orchestrator-composed prompts
    status: rejected
    description: 'orchestrator assembles the full prompt including system prompt, topic, and history formatting. Win: full
      control over prompt engineering. Lose: orchestrator becomes prompt-aware, violates minimalism principle.'
  - name: Raw text history in envelope
    status: rejected
    description: 'history array contains just strings. Win: fewer tokens, simpler parsing. Lose: agents cannot address predecessor
      by role or name.'
  - name: Synthesized output
    status: rejected
    description: 'a final dedicated agent produces a summary after the timer stops. Win: human-readable artifact. Lose: extra
      model call, additional complexity, summary quality variance.'
  choice: Ring topology with annotated history objects, Python implementation, minimal orchestrator with structured JSON envelope,
    rich JSONL transcript to file, dual termination caps (time OR max turns), halt-on-failure, orchestrator seed message.
  reasoning: 'Ring topology preserves adversarial tension with trivial handoff logic ( predecessor = (i-1) mod N ). Python
    minimizes friction for subprocess orchestration and JSONL handling. Minimal orchestrator keeps the script dumb and the
    agents smart: it only pipes a structured envelope to `opencode run` stdin and appends the response to the transcript.
    Raw transcript avoids synthesis complexity. Dual caps prevent runaway cost. Halt-on-failure keeps semantics simple.'
  confidence: firm
  feeds_into: standalone (this is the project itself)
- number: 2
  date: '2026-05-04'
  question: Should Kumbaja migrate from Python to Go as the canonical implementation?
  context: 'The Python version (Decision 1) validated the architecture across 9 modules. A full Go port has been built with
    identical behavior: same YAML config, JSONL transcript format, CLI flags, and termination logic. 43 tests pass with 35.6%
    coverage. The decision profile strongly favors Go for CLI infrastructure (confidence 95).'
  alternatives:
  - name: Keep both
    status: rejected
    description: 'Python and Go side by side. Win: migration safety. Lose: maintenance burden, confusion about which is authoritative.'
  - name: Go only
    status: chosen
    description: 'delete Python, Go becomes canonical. Win: single build surface, portable static binary. Lose: one-time deletion
      risk (recoverable via git).'
  choice: Go only. Delete all Python source files, build artifacts, and Python-specific tooling.
  reasoning: The Go port is complete and verified. A single implementation eliminates confusion and halves the maintenance
    surface. The Python implementation remains accessible in git history if ever needed.
  confidence: firm
  feeds_into: README.md, .gitignore, CI setup
- number: 3
  date: '2026-05-04'
  question: What should the project be named? "Kumbaja" was a codename.
  context: 'The tool runs adversarial deliberation loops — agents in a ring topology debating a topic. The VISION.md identity
    is clinical, rigorous, terse. Naming principle: pronounceable, searchable, not a pun.'
  alternatives:
  - name: Classical arena
    status: rejected
    description: 'Agora, Forum, Lyceum — ancient spaces of debate and judgment. Win condition: the name evokes deliberation
      without explanation.'
  - name: Coined word
    status: rejected
    description: 'e.g. Rignet, Velox — unique, no baggage. Win condition: search results are entirely about this tool from
      day one.'
  choice: Agora — the Athenian marketplace and public square where citizens gathered to debate, challenge ideas, and deliberate.
  reasoning: Agora is the most direct classical match for "space where adversarial deliberation happens." Five letters, pronounceable,
    distinctive in the Go CLI space. The marketplace connotation is acknowledged but accepted — the tool earns the word through
    its function.
  confidence: firm
  feeds_into: VISION.md
- number: 4
  date: '2026-05-04'
  question: Should Agora add an auto mode where the LLM procedurally generates agent configurations from the topic?
  context: Currently requires a handcrafted YAML config file. Auto mode would let users run `agora run --auto <level> --topic
    "..."` and have the model design the agent panel. Inspired by Factory's autonomy levels (Off/Low/Medium/High). Need hard
    caps to prevent runaway cost. Must remain backward-compatible with manual configs.
  alternatives:
  - name: Template-based
    status: rejected
    description: 'preset panels per level, topic fills in details. Win: predictable, fast, no meta-LLM cost. But agent roles
      would be generic, not topic-tailored.'
  - name: LLM-designed with flexible caps
    status: rejected
    description: 'model designs panel AND suggests its own budget. Win: maximally adaptive. But model could lowball caps to
      stay within budget, reducing deliberation quality.'
  - name: LLM-designed with hard-coded caps (chosen)
    status: chosen
    description: 'model designs agents within fixed caps per level. Win: creative agent design with predictable cost boundaries.
      Lose: requires meta-LLM call before deliberation adds latency.'
  choice: 'LLM-designed with hard-coded caps. `--auto <level>` flag on `agora run`, mutually exclusive with `--config`. Five
    levels: Off/Quick/Normal/Deep/YOLO. Same model designs and deliberates. LLM returns YAML parsed through existing LoadConfig.
    Preview-before-confirm. Synthesis always on.'
  reasoning: 'Levels as pure budget constraints — not creative direction — keeps the model honest and behavior predictable.
    The LLM invents agent roles and system prompts tailored to the topic, but cannot exceed the hard caps for its level. Reusing
    LoadConfig for generated YAML means the same validation path covers both manual and auto configs. Preview-before-confirm
    builds trust and catches weird outputs. YOLO is truly uncapped (consensus-only halt) — power users opt into the risk explicitly.


    Level definitions (hard-coded in binary):

    - Quick: 2 agents, 4 turns, 60s time cap

    - Normal: 4 agents, 10 turns, 300s time cap

    - Deep: 8 agents, 20 turns, 900s time cap

    - YOLO: no caps, runs until consensus reached'
  confidence: provisional
  feeds_into: VISION.md, TODO.md
- number: 5
  date: '2026-05-04'
  question: How should Agora support global user settings and a managed transcript store?
  context: Currently every `agora run` requires `--config` or `--auto`, and every `--output` defaults to `transcript.jsonl`
    in the working directory. Users want a global settings file to set preferred defaults, and a managed store for transcripts
    so they don't have to track `.jsonl` files across directories. The design must remain backward-compatible with existing
    CLI behavior and preserve the explicit-over-implicit principle.
  alternatives:
  - name: Single fallback config only
    status: rejected
    description: '`~/.config/agora/config.yaml` used when no `--config` given. Win: simple, one file. Lose: no place for non-config
      preferences (model, output dir), and deliberation configs are different from user preferences.'
  - name: Managed store only
    status: rejected
    description: 'transcripts saved to XDG dirs, no global settings. Win: solves the file sprawl problem. Lose: users still
      must set `--model` and `--auto` every time if they deviate from hard-coded defaults.'
  - name: Broader settings file + managed store (chosen)
    status: chosen
    description: '`~/.config/agora/settings.yaml` holds default model, auto level, topology, and output directory. Transcripts
      stored in `XDG_DATA_HOME/agora/transcripts/<datetime>-<slug>.jsonl`. `agora list` shows the store. `agora resume <slug>`
      resumes by topic slug; `--file` flag preserves path-based resume. Win: both convenience problems solved with one architectural
      layer. Lose: more complexity in config loading path and XDG directory management.'
  choice: 'Broader settings file plus managed transcript store.


    Settings file (`settings.yaml`):

    - `default_model`: string, e.g. `opencode-go/deepseek-v4-flash`

    - `default_auto_level`: string, one of `quick`, `normal`, `deep`, `yolo`

    - `default_topology`: string, one of `ring`, `star`, `mesh`

    - `default_output_dir`: string, path where transcripts are stored (default: XDG_DATA_HOME/agora/transcripts)


    Transcript store:

    - Default output path when `--output` is omitted: `<datetime>-<slug>.jsonl` in the configured output directory

    - `agora list` prints stored transcripts with date, slug, and turn count

    - `agora resume <slug>` matches the latest transcript whose filename contains the slug

    - `agora resume --file <path>` explicitly resumes from a file path, preserving existing behavior


    Config precedence (three layers, highest wins):

    1. CLI flags (`--model`, `--config`, `--auto`, `--output`)

    2. Deliberation config file (agent models, topology)

    3. Global settings file (default model, topology, auto level, output dir)


    A settings value only applies when no higher layer provides that value. For example, `settings.default_model` fills in
    when an agent config omits `model`, but a `--model` flag overrides both.


    Cross-platform directories via XDG equivalents:

    - Linux: `XDG_CONFIG_HOME/agora/` and `XDG_DATA_HOME/agora/`

    - macOS: `~/Library/Application Support/agora/` for both

    - Windows: `%LOCALAPPDATA%/agora/`'
  reasoning: 'The settings/transcript split maps cleanly to existing Unix conventions: config is stateless preferences, data
    is mutable transcripts. Four settings keys is minimal — enough to cover the common friction points without bloating the
    file. The three-layer precedence model keeps explicit CLI behavior intact while letting power users set sane defaults.
    The `--file` flag on resume ensures scripts and existing workflows don''t break.'
  confidence: firm
  feeds_into: PLAN.md, TODO.md, config.go, transcript.go, cmd/agora/main.go
- number: 6
  date: '2026-05-05'
  question: How should Agora provide agents with accurate, up-to-date information during deliberation?
  context: Agents currently deliberate only from the topic and transcript history. Users need agents to incorporate current
    information from web search/fetch and additional context from files or directories, while keeping runs bounded, auditable,
    and consistent with the CLI/config precedence model.
  alternatives:
  - name: User-provided context only
    status: rejected
    description: 'Users pass files, directories, URLs, or pre-collected search results before the run. Win: deterministic and
      easy to audit. Lose: does not satisfy the need for Agora to look up current information itself.'
  - name: Agent-level tool access
    status: rejected
    description: 'Each deliberation agent can search or fetch during its own turn. Win: maximum autonomy. Lose: unfair evidence
      distribution, harder cost control, and less reproducible deliberation dynamics.'
  - name: Orchestrator-managed research phase (chosen)
    status: chosen
    description: 'Before deliberation, the orchestrator infers research queries from the topic, uses OpenCode native websearch
      and webfetch tools through the same model, resolves local text files/directories, and builds a shared evidence bundle.
      Win: fresh context with bounded cost and equal evidence. Lose: research quality depends on a model-mediated pre-run step.'
  choice: 'Add an orchestrator-managed research phase backed by a common source/reference abstraction. The research phase infers
    queries from the topic, uses OpenCode native `websearch` and `webfetch` tools for web retrieval, resolves text-only local
    files and directories, and produces one shared evidence bundle. Each agent receives the identical evidence bundle once,
    on that agent''s first turn. The transcript records a human-readable research summary and source references only, not full
    retrieved content. Research is policy-controlled through config and CLI, uses the same model as the deliberation, and halts
    the run if enabled research fails or produces zero source references.'
  reasoning: 'A pre-run orchestrator research phase makes fresh evidence a bounded precondition for deliberation instead of
    turning every agent into an unbounded browser. A common source/reference model lets files, directories, and web results share
    the same delivery and transcript path, while leaving room for future user-provided and agent-requested authorities. Delivering
    identical evidence once per agent preserves fairness and controls token growth. References-only transcripts accept lossy
    replay in exchange for compact audit trails.'
  confidence: firm
  feeds_into: PLAN.md, TODO.md, internal/research, internal/orchestrator, internal/types, internal/config
- number: 7
  date: '2026-05-06'
  question: How should Agora refactor terminal output to improve visual polish and maintainability?
  context: The current `internal/output` package hand-rolls ANSI colors, panels, tables, wrapping, width accounting, status glyphs,
    and CLI message formatting in a single module. The desired direction is a stronger visual identity built around Agora's cast
    of deliberating agents, while preserving Go-only CLI ergonomics and usable output on plain terminals.
  alternatives:
  - name: Manual ANSI refinement
    status: rejected
    description: 'Keep the current dependency-light approach and improve the existing helpers. Win: minimal dependency risk.
      Lose: continues fighting hand-rolled layout/color code and limits the visual leap.'
  - name: Glamour-led renderer
    status: rejected
    description: 'Render most output through Glamour Markdown themes. Win: strong prose rendering. Lose: structured CLI surfaces
      like turn progress, tables, and config previews become harder to control and test.'
  - name: Coherent Charm v2 agent theater system
    status: chosen
    description: 'Use Lipgloss v2 for layout, color, borders, tables, and role identity, with Glamour v2 reserved for long-form
      Markdown-like agent or synthesis prose. Win: coherent theatrical visual identity with maintainable styling primitives.
      Lose: accepts v2 dependency maturity risk and a broader coordinated refactor.'
  choice: Refactor `internal/output` around a coherent Charm v2 "agent theater" visual system. Lipgloss v2 owns structured
    terminal UI, cast styling, panels, tables, status lines, and fallback-aware layout. Glamour v2 is limited to long-form prose
    where Markdown rendering adds clarity. Update the major output surfaces together so config preview, deliberation header,
    turn progress, stats, and synthesis share one visual language.
  reasoning: The primary win is visual polish, not just removing helper code. Agora's product shape is a cast of agents debating,
    so the output should make roles, turns, and synthesis feel theatrical and coherent. Plain-terminal usability is the hard
    guardrail, which argues against decorative one-offs and against pushing compact status UI through Markdown rendering. A small
    internal theme/cast foundation should come before renderer rewrites so the refactor produces a visual system rather than a
    different kind of scattered styling.
  confidence: firm
  feeds_into: PLAN.md, TODO.md, internal/output, go.mod
- number: 8
  date: '2026-05-06'
  question: How should Agora add personality-rich agent identity to the CLI?
  context: The user wants the CLI to feel more visually striking and dynamic, with fancy long-running indicators, metric progress
    bars, and debate participants that have recognizable profile-like identity. Decision 7 already commits to a Charm v2 agent
    theater renderer while preserving visible `agent_id`, semantic plain output, and testable fallbacks.
  alternatives:
  - name: Config-owned identity
    status: rejected
    description: 'Add display names, colors, avatars, and persona fields now. Win: user control. Lose: schema churn before the
      visual system is proven.'
  - name: Inferred cast identity prototype
    status: chosen
    description: 'Infer display identity, color, and deterministic pixel portraits from agent IDs, then validate through an
      HTML visual rig plus terminal fixture before production integration. Win: strong identity without config migration.'
  - name: Decorative runtime effects first
    status: rejected
    description: 'Start with spinners, progress bars, and animated turn output. Win: immediate motion. Lose: effects lack a
      coherent cast identity foundation.'
  choice: Prototype inferred cast identity first. Generate stable pixel portraits from agent IDs with no external assets or new
    config fields, validate the visual language in both an interactive HTML rig and CLI fixture, then integrate the cast preview
    before runtime effects.
  reasoning: Cast preview is the right first slice because it defines the participant identity system reused by live turns, stats,
    and synthesis. Generated portraits keep Agora self-contained and avoid premature config expansion. Prototype evidence should
    prove the portraits are distinctive, readable at 40/80/120 columns, and safely replaceable by plain badges before production
    code depends on them.
  confidence: provisional
  feeds_into: PLAN.md, TODO.md, internal/output, visual prototype
- number: 9
  date: '2026-05-10'
  question: How should Agora scale research and local context caps across auto levels?
  context: Auto levels already scale agents, turns, and time, but evidence caps stayed fixed at the base settings defaults. Deep
    runs that passed a directory as `--context` could halt before turn 0 with `research_error` after only 20 local text files,
    even when the user intentionally chose `--auto deep` and larger runtime limits. The fix must preserve explicit user settings
    and avoid making context unbounded by default.
  alternatives:
  - name: Keep fixed evidence caps
    status: rejected
    description: 'Leave `research_max_sources`, `context_max_bytes`, and `context_max_depth` at base defaults for every auto
      level. Win: simplest behavior. Lose: contradicts user expectations that broader auto modes can ingest broader evidence.'
  - name: Make YOLO evidence unlimited
    status: rejected
    description: 'Treat `--auto yolo` as unlimited for evidence too. Win: matches the spirit of uncapped turns/time. Lose: unsafe
      for large directories, noisy repos, and accidental cost/token growth.'
  - name: Auto-level-aware fallback caps
    status: chosen
    description: 'Raise evidence fallback defaults by auto level only when the user has not set explicit caps in `settings.yaml`.
      Win: deep/yolo runs get broader bounded context while settings remain authoritative.'
  choice: 'Auto mode scales evidence fallback caps by level: quick keeps `research_max_sources=20`, `context_max_bytes=1048576`,
    and `context_max_depth=5`; normal uses `40`, `4194304`, and `6`; deep uses `300`, `16777216`, and `8`; yolo uses `1000`,
    `67108864`, and `12`. Explicit `settings.yaml` values for `research_max_sources`, `context_max_bytes`, and `context_max_depth`
    continue to override these auto-level fallbacks. Local context caps are soft: traversal includes what fits, truncates text at
    the byte cap, skips files or deeper paths beyond caps, and reports included counts plus warnings in the evidence summary.
    Directory context traversal respects `.gitignore` and VCS/secret safety skips without blanket-skipping hidden project directories.'
  reasoning: Evidence breadth is part of the auto-level contract because broader deliberation is undermined if the pre-deliberation
    research/context phase remains at quick-run limits. Keeping caps finite preserves bounded-context safety, while soft caps prevent
    oversized directory context from aborting before deliberation starts. Respecting `.gitignore` lets project-owned ignore policy
    exclude generated dependency/tooling trees such as `node_modules` without hiding intentional state directories like `.agentera`.
    Treating the auto values as fallbacks, not overrides, preserves the established explicit settings precedence and lets power users
    choose tighter or looser policies globally.
  confidence: firm
  feeds_into: README.md, internal/config/research_policy.go, internal/orchestrator/evidence.go, cmd/agora/main.go, cmd/agora/main_test.go, internal/config/config_test.go, internal/orchestrator/evidence_test.go
