  - number: 63
    timestamp: 2026-07-08 00:31
    type: feat
    phase: build
    what: "Completed Task 4 of the debate ledger plan by wiring the ledger.Updater
      into the orchestrator Run() loop so a ledger update fires after each
      completed agent round and Orchestrator.currentLedger is set before the
      next round's first turn. In internal/orchestrator/orchestrator.go, added a
      ledgerUpdater *ledger.Updater field plus SetLedgerUpdater mirroring
      SetEvidenceCollector (default nil → no-op, so tests that don't exercise
      the ledger stay independent), added a private isDryRun() helper that
      matches the Synthesize path's *agent.AgentRunner type-assertion pattern,
      added updateLedgerIfRoundComplete() called AFTER transcript.Append +
      onTurn callback and BEFORE state.Turn++ in Run(). The round-completion
      test is (state.Turn+1)%numAgents==0; the first round completes after turn
      numAgents-1 and the first agent of round 2 sees the freshly set ledger via
      the existing Task 3 envelope injection at executeTurn.
      updateLedgerIfRoundComplete gates on: updater != nil,
      ledgerEnabled(state.LedgerUpdateEnabled), state.Running (so a mid-round
      interrupt — max_turns, time_limit, budget_exceeded, or user_interrupt
      signal — never produces a partial mid-round update), and the
      round-completion expression. Dry-run mode routes through
      updater.UpdateDryRun(); real mode routes through updater.Update(records,
      topic, synthesizeModel()) and on error writes \"ledger update: <err>\" to
      os.Stderr (the orchestrator personality stays neutral; the failure is not
      visible to agents beyond the absence of an updated ledger, and the next
      round retries using the prior ledger if any). The o.activity(\"Ledger
      Update\") bracket matches collectEvidence's activity-wrapping convention.
      In internal/session/session.go execute(), constructed
      ledger.NewUpdater(runner) the same way evidence.NewPolicyCollector is
      constructed and wired via orch.SetLedgerUpdater. Tests added in
      internal/orchestrator/orchestrator_test.go: five PASS+FAIL pairs for the
      five AC units (TestLedgerRoundBoundaryUpdate, TestLedgerRound0Empty,
      TestLedgerMidRoundInterrupt, TestLedgerDryRunPlaceholder,
      TestLedgerDisableFlagSkipsUpdate); plus the optional AC6-triple test
      TestResolveLedgerPolicyCLIDisablesConfigAndSettingsEnabled in
      cmd/agora/main_test.go addressing the prior audit WARN on Task 3.
      .agentera/plan.yaml Task 4 status flipped from pending to complete."
    commit: c04ac3f
    inspiration: "Task 4 (depends on Tasks 2 and 3) is the per-round wiring of the
      ledger updater. Per Decision 1 (firm), the orchestrator TRIGGERS the
      ledger updater but must not compose prompts from ledger contents; the
      updater's prompt construction (internal/ledger/updater.go) is the only
      prompt for this path, and the orchestrator just calls Update() or
      UpdateDryRun() and SetCurrentLedger(result). Per Decision 6 (firm), ledger
      updates persist the typed state, not full prose — persistence is Task 5's
      job, not Task 4. The round-completion probe (state.Turn+1)%numAgents==0 is
      evaluated BEFORE state.Turn++ in Run() because Turn is the just-completed
      turn index at that point; the first agent of the next round sees the
      ledger because executeTurn reads o.currentLedger via the existing Task 3
      envelope-injection path at orchestrator.go:282. The wiring pattern mirrors
      SetEvidenceCollector / NewPolicyCollector (constructor-as-method,
      runner-scoped, always-constructed) and the activity bracket mirrors
      collectEvidence (\"Ledger Update\" stop phase). Dry-run detection reuses
      the Synthesize path's *agent.AgentRunner type assertion so Task 4's
      dry-run routing remains structurally consistent with the existing
      synthesis dry-run short-circuit. Failed ledger updates are non-fatal: the
      error is written to os.Stderr (matching the AGENTS.md \"stderr is for
      diagnostics\" convention; the project does not use the log package in
      internal/), state.Running is preserved, and o.currentLedger retains the
      prior ledger if any."
