    what: "Completed Task 5 of the debate ledger plan by persisting per-round ledger
      snapshots to the transcript as typed records and teaching show/resume to
      load, render, and re-seed them. In internal/types/types.go added an
      optional `Ledger *DebateLedger` field to TurnRecord (yaml+json,
      omitempty), sibling in shape to the existing `Evidence *EvidenceBundle`
      field, and added LedgerAgentID (\"ledger\") to the IsInternalAgent
      allowlist so ledger sentinel records do not pollute PerAgent stats or
      consensus counts (the transcript query filters already call
      IsInternalAgent). In internal/orchestrator/ orchestrator.go
      updateLedgerIfRoundComplete, after SetCurrentLedger on both the dry-run
      and real Update paths, appends a TurnRecord{Turn: LedgerSentinelTurn (-3),
      AgentID: LedgerAgentID (\"ledger\"), Ledger: <deep clone>, Timestamp: now}
      via the existing transcript.Append pipeline; a nil ledger is a no-op so a
      failed or empty update never writes a malformed record, and the disable
      gate already returns early so --no-ledger persists nothing. In
      internal/transcript/transcript.go LoadFileStrict now runs a
      validateLedgerSentinel check after each unmarshal: a record advertising
      ledger intent (Turn == -3 OR AgentID == \"ledger\") must carry both
      sentinels AND a non-nil, validated DebateLedger, else it fails as a
      malformed transcript record (matching how malformed agent/evidence records
      already fail strict loading). Added LoadFileLenient(path, w io.Writer)
      which emits a warning to w and skips malformed ledger records — including
      JSON-unmarshal failures on ledger-sentinel lines detected via a
      looksLikeLedgerRecord probe — so resume warns-and-continues while still
      failing on non-ledger malformed records (preserving the existing resume
      contract). In cmd/agora/main.go the resume command now loads source
      records via loadTranscriptFileLenient (which warns to os.Stderr) while
      show/stats keep loadTranscriptFile (strict). In
      internal/session/session.go execute() seeds the orchestrator's
      currentLedger from the most recent non-nil Ledger field in the loaded
      records via lastLedgerFromRecords (deep clone) after SetLedgerUpdater, so
      a resumed deliberation starts with continuity and no extra model call; a
      fresh Run has no records so the seed is a no-op. In
      internal/output/transcript.go RenderTranscript detects ledger records
      (r.Ledger != nil OR AgentID == \"ledger\") before the moderator-event
      branch and renders a terse \"Ledger Snapshot\" panel summarizing
      round/positions/agreements/cruxes/draft-status; transcriptMaxTurn skips
      ledger records so they don't inflate the turn counter. Legacy transcripts
      without ledger records load, render, and resume unchanged.
      .agentera/plan.yaml Task 5 status flipped from pending to complete."
