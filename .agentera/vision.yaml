project_name: Agora
north_star: Agora makes adversarial deliberation a standard part of the research workflow. The indie researcher who ships
  ideas fast can stress-test their thinking against a panel of heterogeneous agents before publishing — catching blind spots,
  surfacing hidden assumptions, and sharpening conclusions. "Run Agora on it" becomes as routine as "run the tests."
personas:
- name: The Indie Researcher
  description: It's Tuesday morning. They've spent the weekend building something — a new architecture, a research prototype,
    a controversial take. They know their own reasoning has blind spots but don't have a lab full of colleagues to poke holes.
    They type `agora run --topic "Is this approach sound?"` with a skeptic agent, a domain expert, and a user advocate.
    Ten minutes later they have a transcript of adversarial analysis — agreements, disagreements, unresolved tensions — that
    shows them what they missed. They fix the gaps before anyone else sees them.
principles: []
direction: Toward human-in-the-loop deliberation. Agents surface the sharpest disagreements and unresolved tensions, then
  pause for human judgment on the hardest calls. The agents do the adversarial prep work; the human makes the final decision
  with full context. Agora augments human judgment — it doesn't replace it.
identity:
  personality: ▸ Clinical · rigorous · terse
  voice: Reads like a lab report. Tables, metrics, evidence. No fluff, no enthusiasm, no apology. The deliberating agents
    argue; Agora itself is neutral infrastructure.
  naming: '▸ Named Agora — the ancient Athenian space where citizens gathered to debate and deliberate.

    ▸ Names should be pronounceable, searchable, and not a pun.'
tension: Agent autonomy versus human judgment. "Run agora" like a test implies automation — fire and forget. But human-in-the-loop
  deliberation requires pausing, waiting, depending on human availability. The project's challenge is to make human-in-the-loop
  feel as effortless as automation, without sacrificing the judgment that makes it valuable.
