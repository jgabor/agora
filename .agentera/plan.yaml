      - 4
    status: complete
    acceptance:
      - "GIVEN `agora show TRANSCRIPT --format json` is run WHEN the transcript is valid THEN the output is a schema-versioned inspection document, not an ambiguous replacement for raw JSONL storage"
      - "GIVEN `agora show TRANSCRIPT --format markdown` is run WHEN the transcript is valid THEN the output preserves turn order, agent identity, evidence summaries, consensus fields, and available cast metadata in a readable document"
