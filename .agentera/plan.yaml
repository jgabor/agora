header:
  level: full
  created: '2026-05-16'
  status: complete
  reviewed: '2026-05-16'
  critic_issues: 14 found, 14 addressed, 0 dismissed
  revised: >-
    Split the baseline task, made metadata the source of truth, clarified JSON schema versioning, set the `prime` default to text,
    bounded Markdown contracts, separated `show --format json` from raw JSONL storage, named version artifacts, and added settings
    metadata/redaction constraints. [post-audit-flagged] Agentera lint's 100-word verbosity budget is unsuitable for this full
    executable plan, so the behavioral acceptance detail was retained.
  title: Prime Command And Formatted Inspection Outputs
what: >-
  Add an agent-native `agora prime` command and a shared `--format text|json|markdown` contract for Agora's inspection surfaces.
  `prime` becomes the startup briefing and machine-readable CLI contract for external agents operating Agora, while existing
  transcript/config inspection commands gain stable JSON and Markdown outputs without changing their default terminal text behavior.
why: >-
  Agents need a first-class, current description of Agora's commands, flags, defaults, enum values, settings keys, and transcript
  metadata without confusing that with deliberation `--context` evidence. Consolidating on `--format` gives humans, agents, and tools
  one predictable output contract and prevents ad hoc `--json` flags from fragmenting the CLI surface.
constraints: >-
  Preserve existing default output and interactive terminal behavior for `list`, `stats`, `show`, `validate`, and `config get --all`.
  Use `text` as the default format for every supported inspection command, including `prime`; text may keep terminal-appropriate
  styling, while JSON and Markdown must be non-ANSI. Do not add a separate `--json` alias. Do not change `--context` semantics.
  Keep `prime` read-only. Do not broaden scope into named profiles, output themes, evidence refresh/replay, source allowlists, or
  non-text context support. Do not change the transcript JSONL storage schema except to document existing metadata.
  Redact secret-like values consistently if future settings introduce sensitive values.
previous_plan_archived: .agentera/archive/plan-2026-05-07-transcript-show-and-slug-first-cli-ux.yaml
scope:
  included:
    - "`agora prime` as an agent-readable startup briefing and machine-readable CLI contract"
    - "`--format text|json|markdown` on `prime`, `list`, `stats`, `show`, `validate`, and `config get --all`"
    - versioned JSON output contracts for supported inspection commands
    - "minimal Markdown documents for supported inspection commands, with a richer startup briefing for `prime`"
    - command metadata for commands, flags, defaults, enum values, settings keys, transcript metadata, and schema versions
    - enum/value exposure for command contracts and invalid-value errors
    - tests, README updates, TODO closeout, CHANGELOG update, and CLI version check
  excluded:
    - "live `run` and `resume` output formatting"
    - "a `--json` compatibility alias"
    - named reusable profiles
    - output theme/palette selection
    - evidence refresh/replay, allowlists, or non-text context parsing
    - raw transcript export changes beyond the existing JSONL storage format
  deferred:
    - "named profiles after `prime` exists"
    - broader output themes and cast palettes
    - richer plugin, SDK, or generated-doc production from command metadata
design: >-
  Treat command metadata as the source of truth and `prime` as its user-facing briefing surface. The shared format contract has three
  modes: `text` is the current terminal-oriented renderer, `json` is versioned non-ANSI data, and `markdown` is non-ANSI prose for
  agents and humans. Every JSON response should identify its command/output schema version. `show --format json` is an inspection
  presentation model derived from transcript records, not a replacement for the line-oriented JSONL storage format. README alignment
  should be checked through explicit contract data or marked examples, not brittle prose scraping. Settings metadata should expose key,
  type, default/effective value policy, source, valid values, and redaction behavior where applicable.
tasks:
  - number: 1
    name: Metadata and format contract baseline
    depends_on: []
    status: complete
    acceptance:
      - "GIVEN a supported inspection command is run without `--format` WHEN it succeeds THEN it produces the same default text presentation users see today"
      - "GIVEN `--format text`, `--format json`, or `--format markdown` is used on a supported inspection command WHEN the value is valid THEN the command accepts the value consistently"
      - "GIVEN an invalid format value is used WHEN the command fails THEN the error names the valid values `text`, `json`, and `markdown`"
      - GIVEN command metadata is inspected WHEN commands, flags, defaults, enum values, settings keys, and transcript metadata are described THEN the facts match active CLI behavior
      - GIVEN a JSON inspection output succeeds WHEN a consumer reads it THEN the output includes a schema version and contains no terminal styling
      - GIVEN a Markdown inspection output succeeds WHEN a consumer reads it THEN the output is usable without terminal styling and states the same core facts as the JSON/text surface
      - GIVEN format-contract verification runs WHEN it checks supported surfaces THEN each surface has at least one accepted-format case and one invalid-format case
  - number: 2
    name: Prime startup briefing
    depends_on:
      - 1
    status: complete
    acceptance:
      - "GIVEN `agora prime` or `agora prime --format text` is run WHEN Agora can inspect itself THEN it outputs a concise text startup briefing for agents operating the CLI"
      - "GIVEN `agora prime --format markdown` is run WHEN Agora can inspect itself THEN it outputs an agent-readable briefing with commands, flags, defaults, enum values, settings keys, and transcript metadata"
      - "GIVEN `agora prime --format json` is run WHEN Agora can inspect itself THEN it outputs schema-versioned sections for commands, flags, defaults, enum values, settings keys, and transcript metadata"
      - "GIVEN a reader compares `prime` with `--context PATH` WHEN both are documented THEN `prime` is clearly Agora-provided CLI operating context and `--context` remains user-provided deliberation evidence"
      - GIVEN prime output includes settings information WHEN values are reported THEN secret-like values are redacted consistently across text, JSON, and Markdown
      - "GIVEN automated verification covers `prime` WHEN it runs THEN it includes one machine-readable success path, one Markdown success path, and one invalid-format rejection path"
  - number: 3
    name: Config and validation formatted outputs
    depends_on:
      - 1
    status: complete
    acceptance:
      - "GIVEN `agora validate CONFIG --format json` or `--format markdown` is run WHEN the config is valid THEN the output reports the same validation summary as the default text view"
      - "GIVEN `agora validate CONFIG --format json` or `--format markdown` is run WHEN the config is invalid THEN the command exits unsuccessfully and reports structured validation detail suitable for an agent to self-correct"
      - "GIVEN `agora config get --all --format json` or `--format markdown` is run WHEN settings resolve successfully THEN the output reports every supported key with value and source information"
      - GIVEN settings metadata is shown WHEN keys have defaults or valid values THEN type, source, effective value policy, and allowed values are clear
      - GIVEN automated verification covers config and validation surfaces WHEN it runs THEN each surface has one formatted success case and one relevant failure or rejection case
  - number: 4
    name: Transcript list and stats formatted outputs
    depends_on:
      - 1
    status: complete
    acceptance:
      - "GIVEN `agora list --format json` or `--format markdown` is run WHEN transcripts are present THEN the output reports the same transcript store facts as the default text view"
      - "GIVEN `agora list --format json` or `--format markdown` is run WHEN no transcripts are present THEN the output reports an empty store without relying on terminal styling"
      - "GIVEN `agora stats TRANSCRIPT --format json` or `--format markdown` is run WHEN the transcript is valid THEN the output reports the same aggregate and per-agent facts as the default text view"
      - "GIVEN `agora stats TRANSCRIPT --format json` or `--format markdown` is run WHEN the transcript is missing or invalid THEN the command fails with a clear machine-usable error"
      - GIVEN automated verification covers list and stats surfaces WHEN it runs THEN each surface has one formatted success case and one relevant failure or empty-state case
