header:
  level: full
  created: '2026-05-06'
  status: completed
  reviewed: '2026-05-06'
  critic_issues: 12 found, 12 addressed, 0 dismissed
  title: Charm v2 agent theater output system
what: >-
  Redesign Agora's terminal output around a coherent agent-theater identity while preserving command semantics, transcript data,
  and plain-terminal readability. The plan covers output inventory, Charm v2 dependency viability, shared visual language, the
  major CLI output surfaces, prose rendering boundaries, test migration, and verification.
why: >-
  The current `internal/output` package hand-rolls ANSI colors, panels, tables, wrapping, width accounting, glyphs, and formatting.
  Decision 7 makes visual polish the primary win: Agora's cast of debating agents should feel intentional and memorable while
  staying clear, terminal-native, and maintainable.
constraints: >-
  Stable behavior means command flags, exit behavior, transcript schema, semantic data ordering, and error semantics do not change.
  Visual styling, spacing, borders, wrapping, table formatting, and hierarchy may change. Lipgloss owns structured terminal UI.
  Glamour is limited to paragraph-heavy Markdown-like prose. Color cannot be the only carrier of meaning. Interactive TUI work,
  transcript format changes, deliberation behavior changes, and unrelated TODOs are out of scope.
scope:
  included:
  - output entry point inventory
  - Charm v2 dependency viability and terminal capability behavior
  - shared agent-theater visual language and fallback rules
  - config preview and deliberation header
  - turn progress, verbose content, simple status messages, and delimiters
  - final stats, transcript stats, and synthesis output
  - output test migration and representative command verification
  excluded:
  - interactive TUI
  - transcript schema changes
  - deliberation behavior changes
  - changing command flags or exit semantics
  - unrelated TODO items
  deferred:
  - user-configurable themes
  - non-terminal report output
  - screenshots as required tests
design: >-
  Establish a small internal visual language for stage, cast, status, structured data, and prose. Apply it coherently across all
  major output surfaces. Keep structured metadata rendered as structured terminal UI and reserve Markdown rendering for prose-heavy
  content. Verification focuses on semantic content, width/fallback behavior, command compatibility, and maintainability rather
  than brittle ANSI snapshots.
tasks:
- number: 1
  name: Output inventory and dependency checkpoint
  depends_on: []
  status: complete
  acceptance:
  - GIVEN current commands WHEN output paths are inventoried THEN every major stdout/stderr surface is classified as structured
    metadata, prose, status, stats, or out of scope
  - GIVEN Charm v2 modules are evaluated WHEN dependency resolution runs THEN exact modules are known and the normal Go build/test
    workflow still works
  - GIVEN terminal capability behavior is checked WHEN `NO_COLOR`, low-color, non-TTY, CI, or dumb-terminal conditions apply
    THEN existing behavior is preserved or an explicit fallback decision is recorded
- number: 2
  name: Visual language and fallback rules
  depends_on:
  - Task 1
  status: complete
  acceptance:
  - GIVEN agent roles appear across output surfaces WHEN rendered THEN role identity is consistent by label, ordering, and visual
    treatment
  - GIVEN semantic states appear WHEN color is unavailable THEN textual labels or symbols still distinguish success, error,
    consensus, warning, cost, elapsed time, model, and agent identity
  - GIVEN maintainers inspect output conventions WHEN adding future output THEN the Lipgloss/Glamour boundary and width/fallback
    rules are documented internally
- number: 3
  name: Config preview and deliberation header
  depends_on:
  - Task 2
  status: complete
  acceptance:
  - GIVEN auto config preview renders WHEN users inspect it THEN topology, consensus threshold, level caps, and agents are all
    present and grouped as a coherent cast preview
  - GIVEN deliberation starts WHEN the header renders THEN topic, cast, and run settings remain present with unchanged meaning
  - GIVEN widths of 40, 80, and 120 columns WHEN preview/header output renders THEN critical labels remain present and output
    does not panic or lose required fields
- number: 4
  name: Turn progress and status output
  depends_on:
  - Task 2
  status: complete
  acceptance:
  - GIVEN a turn completes WHEN progress prints THEN agent identity, model, elapsed time, tokens, cost, and consensus state are
    distinguishable without relying on color alone
  - GIVEN verbose mode prints long agent content WHEN output renders THEN metadata remains separate from prose and body text is
    readable
  - GIVEN info, success, error, and delimiter messages render WHEN users scan logs THEN severity and progression remain clear
    in color and plain modes
- number: 5
  name: Stats and synthesis output
  depends_on:
  - Task 2
  status: complete
  acceptance:
  - GIVEN final run stats render WHEN deliberation completes THEN summary and per-agent tables preserve all current metrics
  - GIVEN transcript stats render WHEN users inspect a saved transcript THEN totals, per-agent data, and consensus events remain
    present
  - GIVEN synthesis data renders WHEN available THEN recommendation, confidence, arguments, agreements, and tensions remain
    faithful to model output while sharing the new visual language
- number: 6
  name: Test migration and verification checkpoint
  depends_on:
  - Task 3
  - Task 4
  - Task 5
  status: complete
  acceptance:
  - GIVEN existing exact-output tests exist WHEN they are reviewed THEN each is preserved, normalized, or replaced with semantic
    structure/content assertions
  - GIVEN normal verification runs WHEN the plan completes THEN `go test ./...` passes
  - GIVEN representative dry-run, verbose, stats, synthesis, and error/status paths are exercised WHEN inspected THEN the major
    surfaces feel coherent and remain usable without color
overall_acceptance:
- GIVEN a normal Agora run WHEN users see preview, header, turns, stats, and synthesis THEN the CLI has a coherent agent-theater
  identity without semantic behavior changes
- GIVEN plain or low-color terminals WHEN users inspect output THEN labels and layout preserve all critical information
- GIVEN future output changes WHEN maintainers inspect `internal/output` THEN visual decisions are centralized enough to avoid
  scattered one-off styling
surprises: []
