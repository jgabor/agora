header:
  level: full
  created: '2026-07-07'
  status: active
  reviewed: '2026-07-07'
  critic_issues: "7 found, 7 addressed, 0 dismissed"
  title: "Plan: Debate Ledger (Shared State) and Agent Self-History"
what: >-
  Introduce an orchestrator-maintained, per-round compacted debate state that
  each agent receives in its per-turn envelope, alongside the agent's own
  immediately preceding turn regardless of topology. The ledger carries each
  agent's current stated position, points of agreement surfaced across the
  deliberation, currently open cruxes, and the current draft proposal if one
  exists. A distinct mid-deliberation updater path produces the typed ledger
  from the running transcript after each completed round; it is separate from
  the post-hoc synthesis agent, which retains its existing essay-shape output
  contract. Ledger updates persist as typed transcript records so that show
  and resume can replay them. A disable flag overrides injection through the
  project's established three-layer precedence.
why: >-
  The TODO roadmap and the prior design review independently identify the
  missing shared debate state as the single biggest reason deliberation does
  not deepen across rounds: with the default window an agent never sees its
  own previous turn in any topology, every turn re-derives a position from a
  tiny text slice, the evidence bundle decays out of the window, and consensus
  is attempted on no shared object. Injecting a typed ledger into every
  envelope simultaneously fixes continuity, the small-window problem, evidence
  decay, and per-round token pressure, because the model no longer needs to
  reconstruct state from flat history. Including self-history with the ledger
  avoids reopening the same envelope code path twice. This is the foundational
  Missing Piece #1 from the roadmap; items 3, 4, 5, 6, and 8 all build on the
  ledger as substrate.
constraints: >-
  Minimal orchestrator (Decision 1, firm): the ledger is data injected into the
  envelope; the orchestrator must not compose prompts from ledger contents.
  Go-only single static binary (Decision 2, firm): no external services or
  subprocesses beyond the existing agent runtime. Three-layer precedence
  (Decision 5, firm): the disable flag follows CLI flag > config > settings,
  matching the project's existing precedence for evidence and topology flags.
  References-only transcripts (Decision 6, firm): ledger records persist the
  typed state, not full prose; the transcript record's shape is the typed
  ledger, not a re-injection of essay-shape JSON. Backward compatibility:
  transcripts from prior releases without ledger records continue to load,
  show, and resume in legacy mode without failure. Charm v2 visual system
  (Decision 7, firm): ledger records render through the existing output
  module; no new visual dependency. Off-limits: the consensus regex mechanism,
  the existing synthesis engine's output contract, and the deliverable-gate
  regex are not modified in this plan; they are reserved for the item-3
  proposal-and-voting plan that supersedes them.
