overall_acceptance:
  - "GIVEN an external agent starts work on Agora WHEN it runs `agora prime --format markdown` or `--format json` THEN it receives enough current CLI context to choose commands, flags, defaults, enum values, settings keys, and transcript metadata without reading the README first"
  - "GIVEN a human uses existing inspection commands without `--format` WHEN they run after the change THEN their default terminal output remains familiar and behavior-compatible"
  - "GIVEN tooling uses supported inspection commands with `--format json` WHEN commands succeed THEN outputs are non-ANSI, schema-versioned, stable, and contain the same core facts as text and Markdown surfaces"
  - "GIVEN users read docs or errors WHEN they need machine-readable output THEN Agora consistently teaches `--format text|json|markdown` rather than ad hoc `--json` flags"
  - "GIVEN `--context PATH` and `agora prime` are both documented WHEN an agent or human compares them THEN there is no ambiguity between deliberation evidence input and CLI-operating context"
